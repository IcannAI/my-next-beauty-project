name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: 'ci-test-secret'
          AUTH_SECRET: 'ci-test-secret'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/postgres'
          DATABASE_URL_UNPOOLED: 'postgresql://postgres:postgres@localhost:5432/postgres'
          PUSHER_APP_ID: 'test'
          PUSHER_KEY: 'test'
          PUSHER_SECRET: 'test'
          PUSHER_CLUSTER: 'ap3'
          NEXT_PUBLIC_PUSHER_KEY: 'test'
          NEXT_PUBLIC_PUSHER_CLUSTER: 'ap3'
          AWS_REGION: 'auto'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          S3_BUCKET_NAME: 'test'
          S3_ENDPOINT: 'https://test.r2.cloudflarestorage.com'
